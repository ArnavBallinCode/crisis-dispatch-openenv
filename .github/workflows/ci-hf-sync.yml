name: CI and Hugging Face Sync

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Detect project directory
        id: project-dir
        run: |
          if [ -f "pyproject.toml" ] && [ -d "app" ] && [ -f "inference.py" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "Unable to find project root containing pyproject.toml, app/, and inference.py"
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run pytest suite
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: python -m pytest -q

      - name: Run deterministic baseline check
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: python inference.py --mode heuristic --task all --check-determinism

  sync-to-hf:
    name: Sync to Hugging Face Space
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Hugging Face target
        id: hf-target
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_SPACE_ID:-}" ]; then
            echo "HF_TOKEN and HF_SPACE_ID must be configured in GitHub repository secrets."
            exit 1
          fi

          HF_SPACE_TARGET="${HF_SPACE_ID%/}"
          case "$HF_SPACE_TARGET" in
            https://huggingface.co/spaces/*)
              HF_SPACE_TARGET="${HF_SPACE_TARGET#https://huggingface.co/spaces/}"
              ;;
            http://huggingface.co/spaces/*)
              HF_SPACE_TARGET="${HF_SPACE_TARGET#http://huggingface.co/spaces/}"
              ;;
          esac

          if [[ ! "$HF_SPACE_TARGET" =~ ^[^/]+/[^/]+$ ]]; then
            echo "Invalid HF_SPACE_ID: '$HF_SPACE_ID'"
            echo "Expected format: owner/space OR https://huggingface.co/spaces/owner/space"
            exit 1
          fi

          echo "space_id=$HF_SPACE_TARGET" >> "$GITHUB_OUTPUT"

      - name: Push latest main commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ steps.hf-target.outputs.space_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove hf >/dev/null 2>&1 || true
          git remote add hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push hf HEAD:main --force
