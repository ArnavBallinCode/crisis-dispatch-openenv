name: CI and Hugging Face Sync

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            crisis-dispatch-env/requirements.txt
            crisis-dispatch-env/pyproject.toml

      - name: Detect project directory
        id: project-dir
        run: |
          if [ -f "pyproject.toml" ] && [ -d "app" ] && [ -f "inference.py" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "crisis-dispatch-env/pyproject.toml" ] && [ -d "crisis-dispatch-env/app" ] && [ -f "crisis-dispatch-env/inference.py" ]; then
            echo "dir=crisis-dispatch-env" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to find project root containing pyproject.toml, app/, and inference.py"
            exit 1
          fi

      - name: Install dependencies
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run pytest suite
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: python -m pytest -q

      - name: Run deterministic baseline check
        working-directory: ${{ steps.project-dir.outputs.dir }}
        run: python inference.py --mode heuristic --task all --check-determinism

  sync-to-hf:
    name: Sync to Hugging Face Space
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "HF_TOKEN and HF_SPACE_ID must be configured in GitHub repository secrets."
            exit 1
          fi

      - name: Push latest main commit to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push hf HEAD:main --force
